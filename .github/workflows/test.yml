name: Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{matrix.os}}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Zig Compiler
        uses: mlugg/setup-zig@v2
        with:
          version: master
      - run: zig build --summary new
      - run: zig build test --summary new
      - name: Build examples
        working-directory: examples
        run: zig build --summary new
